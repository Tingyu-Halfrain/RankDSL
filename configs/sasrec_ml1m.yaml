# configs/sasrec_ml1m.yaml
# ========= 环境/路径 =========
data_path: ./dataset
checkpoint_dir: ./saved_ckpt
reproducibility: True # 开启可复现模式
seed: 2026 # 配合 reproducibility 使用
show_progress: True # 启用 tdqm 评估进度条。 

# ========= 数据集（MovieLens-1M / ml-1m）=========
USER_ID_FIELD: user_id
ITEM_ID_FIELD: item_id
RATING_FIELD: rating # 交互表里评分列名
TIME_FIELD: timestamp # 交互表里时间戳列名

load_col: # 指定要从哪些文件加载哪些列
  inter: [user_id, item_id, rating, timestamp]
  item: [item_id, movie_title, release_year, genre]
  user: [user_id, age, gender, occupation, zip_code]

# 把显式评分转成隐式正反馈：保留 rating >= 4 的交互
val_interval:
  rating: "[4,inf)"

# k-core：对 rerank 候选覆盖更友好，先用 5-core
user_inter_num_interval: "[5,inf)"
item_inter_num_interval: "[5,inf)"

# ========= Sequential 数据生成所需 =========
ITEM_LIST_LENGTH_FIELD: item_length # 记录每条样本历史序列有多长
LIST_SUFFIX: _list
MAX_ITEM_LIST_LENGTH: 100

# ========= 模型：SASRec =========
model: SASRec
hidden_size: 64
inner_size: 256
n_layers: 2
n_heads: 2
hidden_dropout_prob: 0.3
attn_dropout_prob: 0.3
hidden_act: gelu
layer_norm_eps: 1e-12
initializer_range: 0.02

# SASRec: CE => 不需要负采样（必须置空）
loss_type: CE
train_neg_sample_args: null

# ========= 训练 =========
epochs: 100
train_batch_size: 4096
learning_rate: 0.003
gpu_id: "3"
learner: adam

# ========= 评估：留一法 + 全量候选集评估 =========
eval_args:
  group_by: user # 按用户分组做评估（推荐任务通常如此）
  order: TO
  split: {'LS': 'valid_and_test'} # 留一法
  mode: full

metrics: [Recall, NDCG, Hit] # 计算指标
topk: [10, 20, 50]
valid_metric: Recall@20
valid_metric_bigger: True 

eval_batch_size: 4096
stopping_step: 10
eval_step: 1
metric_decimal_place: 4
