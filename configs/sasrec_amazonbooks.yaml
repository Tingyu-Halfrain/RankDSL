# configs/sasrec_amazonbooks.yaml

# ========= 环境/路径 =========
data_path: ./dataset
checkpoint_dir: ./saved_ckpt
reproducibility: True
seed: 2026
show_progress: True

# ========= 数据集（Amazon-Books）=========
# 注意：确保你的原子文件名为 amazon-books.inter / .item / .user
dataset: amazon-books

USER_ID_FIELD: user_id
ITEM_ID_FIELD: item_id
RATING_FIELD: rating
TIME_FIELD: timestamp

# [关键修改 1] 加载 RankDSL 必须的元数据
# 你的 .item 文件表头必须包含 title, price, categories (或 category)
load_col:
  inter: [user_id, item_id, rating, timestamp]
  item: [item_id, title, price, categories, brand] 
  user: [user_id] # Amazon 通常没有 user profile，只加载 ID 即可

# [关键修改 2] 评分阈值
# Amazon 评分普遍虚高，且很多数据是隐式的。
# 建议保留所有交互，或者只保留 rating >= 3。
# 如果你的数据只有 0/1 隐式反馈，请注释掉 val_interval
val_interval:
  rating: "[0,inf)" 

# [关键修改 3] 5-core 过滤
# Amazon 极其稀疏，必须用 5-core，否则 SASRec 根本学不到东西
# 注意：这会大幅减少 User/Item 数量，是正常的预处理步骤
user_inter_num_interval: "[5,inf)"
item_inter_num_interval: "[5,inf)"

# ========= Sequential 数据生成 =========
ITEM_LIST_LENGTH_FIELD: item_length
LIST_SUFFIX: _list
# 书籍消费序列比电影短，50 足够覆盖长期兴趣，且能减少 Padding 噪音
MAX_ITEM_LIST_LENGTH: 50

# ========= 模型：SASRec =========
model: SASRec
# Amazon 数据集较大，词表(Item数)更大，保持 64 或尝试 128
hidden_size: 64 
inner_size: 256
n_layers: 2
n_heads: 2
hidden_dropout_prob: 0.3 # [微调] 数据稀疏，适当增加 Dropout 防止过拟合
attn_dropout_prob: 0.3
hidden_act: gelu
layer_norm_eps: 1e-12
initializer_range: 0.02

# CE Loss (全类目 Softmax)，适合召回
loss_type: CE
train_neg_sample_args: null

# ========= 训练 =========
epochs: 200 # 收敛通常比 ML-1M 慢，但 200 够了
train_batch_size: 2048 # 如果显存够大(24G+)，可以开到 4096
learning_rate: 0.001
gpu_id: "1"
learner: adam

# ========= 评估：严格的时序留一法 =========
eval_args:
  group_by: user
  order: TO # Temporal Order (必须是时间序)
  split: {'LS': 'valid_and_test'} # Leave-One-Out
  mode: full # 全量评估，最慢但最准。如果太慢可改为 uni: 100 (采样100个负例)

metrics: [Recall, NDCG, Hit]
# [关键修改 4] TopK 设置
# RankDSL 需要 Top-20 或 Top-50 作为输入，这里必须包含这些指标
topk: [10, 20, 50] 
valid_metric: NDCG@20
valid_metric_bigger: True

eval_batch_size: 4096
stopping_step: 10
eval_step: 1
metric_decimal_place: 4